<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Native Research Lab</title>
  <script src="./config.js"></script>
  <style>
    :root {
      --bg: #f4f6fb;
      --panel: #ffffff;
      --text: #111827;
      --muted: #64748b;
      --line: #e5e7eb;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --dark: #0f172a;
      --soft: #eef2ff;
      --ok-bg: #dcfce7;
      --ok-text: #166534;
      --warn-bg: #fef9c3;
      --warn-text: #854d0e;
      --info-bg: #dbeafe;
      --info-text: #1d4ed8;
      --radius-lg: 22px;
      --radius-md: 14px;
      --shadow: 0 16px 40px rgba(15, 23, 42, .08);
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", "Segoe UI", sans-serif;
      word-break: keep-all;
      overflow-wrap: break-word;
      line-height: 1.65;
      letter-spacing: -0.02em;
    }

    button, input, select, textarea {
      font: inherit;
    }

    .layout {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 280px 1fr;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      background: linear-gradient(180deg, #0f172a 0%, #111827 100%);
      color: white;
      padding: 28px 18px;
      overflow-y: auto;
    }

    .brand {
      padding: 6px 10px 24px;
      border-bottom: 1px solid rgba(255,255,255,.1);
      margin-bottom: 18px;
    }

    .brand-title {
      font-size: 22px;
      line-height: 1.25;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .brand-sub {
      margin-top: 8px;
      color: #cbd5e1;
      font-size: 13px;
      line-height: 1.5;
    }

    .nav {
      display: grid;
      gap: 6px;
    }

    .nav button {
      width: 100%;
      border: 0;
      background: transparent;
      color: #cbd5e1;
      text-align: left;
      padding: 12px 12px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
    }

    .nav button:hover,
    .nav button.active {
      background: rgba(255,255,255,.1);
      color: #fff;
    }

    .content {
      padding: 34px;
      max-width: 1440px;
      width: 100%;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.15;
      letter-spacing: -0.06em;
    }

    h2 {
      margin: 0 0 16px;
      font-size: 22px;
      line-height: 1.3;
      letter-spacing: -0.04em;
    }

    h3 {
      margin: 0 0 8px;
      font-size: 16px;
      line-height: 1.4;
    }

    .subtitle {
      color: var(--muted);
      margin-top: 10px;
      max-width: 820px;
      font-size: 15px;
    }

    .section { display: none; }
    .section.active { display: block; }

    .grid { display: grid; gap: 16px; }
    .cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 22px;
      box-shadow: var(--shadow);
    }

    .card.compact { padding: 18px; }

    .label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .value {
      font-size: 24px;
      font-weight: 900;
      line-height: 1.25;
      letter-spacing: -0.04em;
    }

    .text-muted { color: var(--muted); }

    .btn {
      border: 0;
      border-radius: 12px;
      padding: 11px 16px;
      color: #fff;
      background: var(--primary);
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(37, 99, 235, .22);
      white-space: nowrap;
    }

    .btn:hover { background: var(--primary-dark); }
    .btn:disabled { opacity: .55; cursor: not-allowed; }
    .btn.secondary { background: #334155; box-shadow: none; }

    .hero {
      background: linear-gradient(135deg, #ffffff 0%, #eef2ff 100%);
      border: 1px solid #dbeafe;
      border-radius: 28px;
      padding: 28px;
      margin-bottom: 18px;
      box-shadow: var(--shadow);
    }

    .hero-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #dbeafe;
      color: #1d4ed8;
      font-size: 13px;
      font-weight: 900;
      margin-bottom: 14px;
    }

    .progress {
      height: 10px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 10px;
    }

    .bar {
      height: 100%;
      background: linear-gradient(90deg, #2563eb, #7c3aed);
      width: 0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      background: var(--info-bg);
      color: var(--info-text);
    }

    .badge.approved, .badge.done, .badge.accepted, .badge.승인, .badge.완료 {
      background: var(--ok-bg);
      color: var(--ok-text);
    }

    .badge.review, .badge.inprogress, .badge.진행중, .badge.검토중, .badge.논의중 {
      background: var(--warn-bg);
      color: var(--warn-text);
    }

    .list { display: grid; gap: 12px; }

    .item {
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: 15px;
      background: #fff;
    }

    .item-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .item-title {
      font-weight: 900;
      line-height: 1.4;
    }

    .item-meta {
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    th, td {
      padding: 13px 14px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      font-size: 14px;
      line-height: 1.55;
    }

    th {
      background: #f8fafc;
      font-weight: 900;
      white-space: nowrap;
    }

    tr:last-child td { border-bottom: 0; }

    .table-wrap {
      overflow-x: auto;
      border-radius: var(--radius-lg);
    }

    .form {
      display: grid;
      gap: 14px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 12px;
      align-items: start;
    }

    .form-row label {
      font-size: 14px;
      color: #334155;
      font-weight: 900;
      padding-top: 10px;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: #fff;
      color: var(--text);
      padding: 11px 12px;
      outline: none;
      line-height: 1.5;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 4px rgba(147, 197, 253, .35);
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    .empty {
      border: 1px dashed #cbd5e1;
      background: #fff;
      color: var(--muted);
      border-radius: var(--radius-md);
      padding: 18px;
    }

    .toast {
      position: fixed;
      right: 24px;
      top: 24px;
      z-index: 99;
      background: #0f172a;
      color: #fff;
      border-radius: 14px;
      padding: 13px 16px;
      box-shadow: 0 18px 40px rgba(0,0,0,.22);
      transform: translateY(-8px);
      opacity: 0;
      pointer-events: none;
      transition: .2s ease;
      max-width: 360px;
      line-height: 1.45;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .notice {
      border-left: 5px solid #2563eb;
      background: #eff6ff;
      border-radius: 16px;
      padding: 16px 18px;
      color: #1e3a8a;
      font-weight: 700;
    }

    .spacer { height: 18px; }

    @media (max-width: 1100px) {
      .cols-4, .cols-3 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .layout { grid-template-columns: 240px 1fr; }
    }

    @media (max-width: 820px) {
      .layout { display: block; }
      .sidebar { position: static; height: auto; }
      .content { padding: 22px 16px; }
      .topbar { flex-direction: column; }
      .cols-4, .cols-3, .cols-2 { grid-template-columns: 1fr; }
      .form-row { grid-template-columns: 1fr; gap: 6px; }
      .form-row label { padding-top: 0; }
      .nav { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <div id="toast" class="toast"></div>

  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-title">AI Native<br>Research Lab</div>
        <div class="brand-sub">AX기획팀 AI Native 전환 연구실</div>
      </div>
      <nav class="nav">
        <button class="active" data-section="dashboard">대시보드</button>
        <button data-section="roadmap">로드맵</button>
        <button data-section="discussion">논의</button>
        <button data-section="decision">의사결정</button>
        <button data-section="framework">프레임워크</button>
        <button data-section="guide">참여 방법</button>
      </nav>
    </aside>

    <main class="content">
      <div class="topbar">
        <div>
          <h1 id="pageTitle">대시보드</h1>
          <div id="pageSubtitle" class="subtitle">연구 데이터를 불러오는 중입니다.</div>
        </div>
        <button class="btn secondary" onclick="loadData()">새로고침</button>
      </div>

      <section id="dashboard" class="section active"></section>
      <section id="roadmap" class="section"></section>
      <section id="discussion" class="section"></section>
      <section id="decision" class="section"></section>
      <section id="framework" class="section"></section>
      <section id="guide" class="section"></section>
    </main>
  </div>

  <script>
    let DATA = {};
    let IS_SAVING = false;

    const TITLES = {
      dashboard: '대시보드',
      roadmap: '로드맵',
      discussion: '논의',
      decision: '의사결정',
      framework: '프레임워크',
      guide: '참여 방법'
    };

    document.querySelectorAll('.nav button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.section).classList.add('active');
        document.getElementById('pageTitle').textContent = TITLES[btn.dataset.section] || btn.textContent;
      });
    });

    function loadData() {
      if (!isApiReady()) return;
      document.getElementById('pageSubtitle').textContent = '연구 데이터를 불러오는 중입니다.';
      jsonp(`${API_URL}?callback=handleBoardData&ts=${Date.now()}`);
    }

    function handleBoardData(data) {
      if (!data || data.ok === false) {
        showToast(data && data.message ? data.message : '데이터를 불러오지 못했습니다.');
        return;
      }
      DATA = data;
      render();
      showToast('최신 데이터를 불러왔습니다.');
    }

    function render() {
      const p = DATA.project || {};
      document.getElementById('pageSubtitle').textContent = `${p['Project Name'] || 'AI Native Enterprise Framework'} · ${p['Status'] || '-'} · v${p['Version'] || '-'}`;
      renderDashboard();
      renderRoadmap();
      renderDiscussion();
      renderDecision();
      renderFramework();
      renderGuide();
    }

    function renderDashboard() {
      const p = DATA.project || {};
      const roadmap = DATA.roadmap || [];
      const decisions = DATA.decisions || [];
      const discussions = DATA.discussions || [];
      const framework = DATA.framework || [];
      const progress = parseProgress(p['Progress']);
      const current = roadmap.find(r => r.Status === '진행중') || roadmap[0] || {};

      document.getElementById('dashboard').innerHTML = `
        <div class="hero">
          <div class="hero-kicker">현재 연구</div>
          <h1>${esc(p['Current Focus'] || 'AX기획팀 AI Native 전환')}</h1>
          <div class="subtitle">${esc(p['This Week Goal'] || '업무영역별 AI 도입 방식과 필요한 구성요소를 작게 분석합니다.')}</div>
          <div class="progress"><div class="bar" style="width:${progress}%"></div></div>
          <div class="subtitle">전체 진행률 ${progress}% · 마지막 업데이트 ${esc(p['Last Updated'] || '-')}</div>
        </div>

        <div class="grid cols-4">
          ${metric('현재 단계', p['Current Phase'] || '-')}
          ${metric('로드맵 항목', roadmap.length)}
          ${metric('논의 중', discussions.filter(x => x.Status === '논의중').length)}
          ${metric('승인된 결정', decisions.filter(x => x.Status === '승인').length)}
        </div>

        <div class="spacer"></div>

        <div class="grid cols-2">
          <div class="card">
            <h2>현재 로드맵 위치</h2>
            ${current.Phase ? roadmapMini(current) : '<div class="empty">진행 중인 로드맵이 없습니다.</div>'}
          </div>
          <div class="card">
            <h2>다음 행동</h2>
            <div class="notice">${esc(p['Next Action'] || '요구사항 분석 업무영역부터 AI Native 적용표를 작성합니다.')}</div>
          </div>
        </div>

        <div class="spacer"></div>

        <div class="grid cols-3">
          <div class="card">
            <h2>최근 논의</h2>
            ${itemList(discussions.slice(0, 4), 'Topic', 'Content', 'Author')}
          </div>
          <div class="card">
            <h2>최근 의사결정</h2>
            ${itemList(decisions.slice(0, 4), 'Title', 'Decision', 'Author')}
          </div>
          <div class="card">
            <h2>프레임워크 후보</h2>
            ${itemList(framework.slice(0, 4), 'Title', 'Content', 'Category')}
          </div>
        </div>
      `;
    }

    function renderRoadmap() {
      const rows = DATA.roadmap || [];
      document.getElementById('roadmap').innerHTML = `
        <div class="card">
          <h2>로드맵 상태 수정</h2>
          <div class="form" id="roadmapForm">
            ${formRow('번호', '<input id="rdNo" placeholder="예: 1">')}
            ${formRow('상태', '<select id="rdStatus"><option>대기</option><option>진행중</option><option>검토중</option><option>완료</option></select>')}
            ${formRow('진행률', '<input id="rdProgress" type="number" min="0" max="100" placeholder="0~100">')}
            ${formRow('담당자', memberSelect('rdOwner'))}
            ${formRow('메모', '<textarea id="rdNote" placeholder="현재 상황이나 다음 작업을 적어주세요."></textarea>')}
            <button class="btn" onclick="submitRoadmap(this)">로드맵 수정</button>
          </div>
        </div>
        <div class="spacer"></div>
        ${table(rows, ['No','Phase','Description','Status','Progress','Owner','Note'])}
      `;
    }

    function renderDiscussion() {
      document.getElementById('discussion').innerHTML = `
        <div class="card">
          <h2>논의 등록</h2>
          <div class="notice" style="margin-bottom:16px;">개인의 의견뿐 아니라 팀 의견, 질문, 반론, 보완 의견을 작게 기록합니다.</div>
          <div class="form" id="discussionForm">
            ${formRow('작성자', memberSelect('disAuthor'))}
            ${formRow('주제', '<input id="disTopic" placeholder="예: 요구사항 분석에서 AI 역할">')}
            ${formRow('유형', '<select id="disType"><option>의견</option><option>질문</option><option>제안</option><option>반론</option><option>보완</option></select>')}
            ${formRow('내용', '<textarea id="disContent" placeholder="팀원과 공유할 의견을 작성하세요."></textarea>')}
            ${formRow('상태', '<select id="disStatus"><option>논의중</option><option>검토중</option><option>종료</option></select>')}
            <button class="btn" onclick="submitDiscussion(this)">논의 저장</button>
          </div>
        </div>
        <div class="spacer"></div>
        ${table(DATA.discussions || [], ['ID','Date','Author','Topic','Type','Content','Status'])}
      `;
    }

    function renderDecision() {
      document.getElementById('decision').innerHTML = `
        <div class="card">
          <h2>의사결정 등록</h2>
          <div class="notice" style="margin-bottom:16px;">확정된 내용만 작게 기록합니다. 큰 프레임워크는 여러 의사결정이 쌓인 뒤 정리합니다.</div>
          <div class="form" id="decisionForm">
            ${formRow('작성자', memberSelect('decAuthor'))}
            ${formRow('제목', '<input id="decTitle" placeholder="예: 문서 작성 언어 기준">')}
            ${formRow('결정', '<textarea id="decDecision" placeholder="무엇을 결정했는지 한 문장으로 작성하세요."></textarea>')}
            ${formRow('이유', '<textarea id="decReason" placeholder="왜 그렇게 결정했는지 작성하세요."></textarea>')}
            ${formRow('상태', '<select id="decStatus"><option>초안</option><option>검토중</option><option>승인</option><option>폐기</option></select>')}
            <button class="btn" onclick="submitDecision(this)">의사결정 저장</button>
          </div>
        </div>
        <div class="spacer"></div>
        ${table(DATA.decisions || [], ['ID','Date','Author','Title','Decision','Reason','Status'])}
      `;
    }

    function renderFramework() {
      document.getElementById('framework').innerHTML = `
        <div class="card">
          <h2>프레임워크 후보 등록</h2>
          <div class="notice" style="margin-bottom:16px;">프레임워크는 확정 문서가 아니라 후보로 시작합니다. 충분히 검토된 뒤 승인합니다.</div>
          <div class="form" id="frameworkForm">
            ${formRow('분류', '<input id="fwCategory" placeholder="예: 정의, 운영 원칙, 업무 모델">')}
            ${formRow('제목', '<input id="fwTitle" placeholder="예: AI Native 정의">')}
            ${formRow('내용', '<textarea id="fwContent" placeholder="프레임워크 후보 내용을 작성하세요."></textarea>')}
            ${formRow('상태', '<select id="fwStatus"><option>초안</option><option>검토중</option><option>승인</option><option>폐기</option></select>')}
            <button class="btn" onclick="submitFramework(this)">프레임워크 저장</button>
          </div>
        </div>
        <div class="spacer"></div>
        ${table(DATA.framework || [], ['ID','Category','Title','Content','Status','Version'])}
      `;
    }

    function renderGuide() {
      document.getElementById('guide').innerHTML = `
        <div class="card">
          <h2>참여 방법</h2>
          <div class="grid cols-2">
            <div class="item">
              <h3>1. 현재 상태 확인</h3>
              <p class="text-muted">대시보드에서 현재 연구 주제, 이번 주 목표, 최근 논의와 의사결정을 확인합니다.</p>
            </div>
            <div class="item">
              <h3>2. 의견 등록</h3>
              <p class="text-muted">개인 의견, 팀 의견, 질문, 반론은 모두 논의 메뉴에 작게 기록합니다.</p>
            </div>
            <div class="item">
              <h3>3. 결정 기록</h3>
              <p class="text-muted">합의된 내용은 의사결정 메뉴에 한 문장 중심으로 남깁니다.</p>
            </div>
            <div class="item">
              <h3>4. 프레임워크 정리</h3>
              <p class="text-muted">의사결정이 쌓이면 반복되는 패턴을 프레임워크 후보로 정리합니다.</p>
            </div>
          </div>
        </div>
      `;
    }

    function submitDecision(btn) {
      post(btn, 'addDecision', {
        author: val('decAuthor'), title: val('decTitle'), decision: val('decDecision'), reason: val('decReason'), status: val('decStatus')
      }, '의사결정이 저장되었습니다.', 'decisionForm');
    }

    function submitDiscussion(btn) {
      post(btn, 'addDiscussion', {
        author: val('disAuthor'), topic: val('disTopic'), type: val('disType'), content: val('disContent'), status: val('disStatus')
      }, '논의가 저장되었습니다.', 'discussionForm');
    }

    function submitFramework(btn) {
      post(btn, 'addFramework', {
        category: val('fwCategory'), title: val('fwTitle'), content: val('fwContent'), status: val('fwStatus')
      }, '프레임워크 후보가 저장되었습니다.', 'frameworkForm');
    }

    function submitRoadmap(btn) {
      post(btn, 'updateRoadmap', {
        no: val('rdNo'), status: val('rdStatus'), progress: val('rdProgress'), owner: val('rdOwner'), note: val('rdNote')
      }, '로드맵이 수정되었습니다.', 'roadmapForm');
    }

    async function post(btn, action, data, successMessage, formId) {
      if (!isApiReady() || !lock(btn)) return;
      try {
        await fetch(API_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action, data })
        });
        showToast(successMessage);
        resetForm(formId);
        setTimeout(loadData, 900);
      } catch (err) {
        showToast('저장 중 오류가 발생했습니다. API URL과 배포 권한을 확인하세요.');
      } finally {
        unlock(btn);
      }
    }

    function isApiReady() {
      if (!window.API_URL || API_URL.includes('PASTE_YOUR')) {
        showToast('docs/config.js에 Apps Script Web App URL을 입력해야 합니다.');
        document.getElementById('dashboard').innerHTML = '<div class="empty">API_URL이 설정되지 않았습니다. docs/config.js를 먼저 수정하세요.</div>';
        return false;
      }
      return true;
    }

    function jsonp(url) {
      const s = document.createElement('script');
      s.src = url;
      s.onerror = () => showToast('데이터 호출에 실패했습니다. Apps Script 배포 URL을 확인하세요.');
      document.body.appendChild(s);
      setTimeout(() => s.remove(), 5000);
    }

    function metric(label, value) {
      return `<div class="card compact"><div class="label">${esc(label)}</div><div class="value">${esc(value)}</div></div>`;
    }

    function roadmapMini(row) {
      const progress = parseProgress(row.Progress);
      return `<div class="item"><div class="item-head"><div><div class="item-title">${esc(row.Phase)}</div><div class="item-meta">${esc(row.Description || '')}</div></div><span class="badge ${cls(row.Status)}">${esc(row.Status || '-')}</span></div><div class="progress"><div class="bar" style="width:${progress}%"></div></div><div class="item-meta">${progress}% · 담당자 ${esc(row.Owner || '-')}</div></div>`;
    }

    function itemList(rows, titleKey, bodyKey, metaKey) {
      if (!rows || !rows.length) return '<div class="empty">등록된 항목이 없습니다.</div>';
      return `<div class="list">${rows.map(r => `<div class="item"><div class="item-title">${esc(r[titleKey] || '-')}</div><div class="text-muted">${esc(r[bodyKey] || '')}</div><div class="item-meta">${esc(r[metaKey] || '')}</div></div>`).join('')}</div>`;
    }

    function table(rows, headers) {
      if (!rows || !rows.length) return '<div class="empty">등록된 항목이 없습니다.</div>';
      return `<div class="table-wrap"><table><thead><tr>${headers.map(h => `<th>${esc(headerKo(h))}</th>`).join('')}</tr></thead><tbody>${rows.map(r => `<tr>${headers.map(h => cell(h, r[h])).join('')}</tr>`).join('')}</tbody></table></div>`;
    }

    function cell(key, value) {
      const v = value == null ? '' : String(value);
      if (key === 'Status') return `<td><span class="badge ${cls(v)}">${esc(v)}</span></td>`;
      if (key === 'Progress') {
        const n = parseProgress(v);
        return `<td>${n}%<div class="progress"><div class="bar" style="width:${n}%"></div></div></td>`;
      }
      return `<td>${esc(v)}</td>`;
    }

    function headerKo(key) {
      return ({ No:'번호', Phase:'단계', Description:'설명', Status:'상태', Progress:'진행률', Owner:'담당자', Note:'메모', ID:'ID', Date:'일시', Author:'작성자', Topic:'주제', Type:'유형', Content:'내용', Title:'제목', Decision:'결정', Reason:'이유', Category:'분류', Version:'버전' })[key] || key;
    }

    function formRow(label, field) {
      return `<div class="form-row"><label>${esc(label)}</label>${field}</div>`;
    }

    function memberSelect(id) {
      return `<select id="${id}">${(DATA.members || ['etc']).map(m => `<option>${esc(m)}</option>`).join('')}</select>`;
    }

    function val(id) { const el = document.getElementById(id); return el ? el.value.trim() : ''; }
    function parseProgress(v) { return Math.max(0, Math.min(100, parseFloat(String(v || '0').replace('%','')) || 0)); }
    function cls(v) { return String(v || '').replace(/[^a-zA-Z0-9가-힣_-]/g, '').toLowerCase(); }
    function esc(v) { return String(v || '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;'); }

    function lock(btn) {
      if (IS_SAVING || !btn) return false;
      IS_SAVING = true;
      btn.dataset.text = btn.textContent;
      btn.disabled = true;
      btn.textContent = '저장 중...';
      return true;
    }

    function unlock(btn) {
      IS_SAVING = false;
      if (!btn) return;
      btn.disabled = false;
      btn.textContent = btn.dataset.text || '저장';
    }

    function resetForm(id) {
      const form = document.getElementById(id);
      if (!form) return;
      form.querySelectorAll('input, textarea').forEach(el => el.value = '');
      form.querySelectorAll('select').forEach(el => el.selectedIndex = 0);
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2200);
    }

    loadData();
  </script>
</body>
</html>
