<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Native Lab</title>
  <script src="./config.js"></script>
  <style>
    :root{--bg:#f6f7fb;--panel:#fff;--text:#111827;--muted:#6b7280;--line:#e5e7eb;--dark:#111827;--primary:#2563eb;--green:#16a34a;--yellow:#ca8a04;--radius:18px;}
    *{box-sizing:border-box}body{margin:0;font-family:Arial,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text)}
    .layout{display:grid;grid-template-columns:260px 1fr;min-height:100vh}.side{background:var(--dark);color:#fff;padding:26px 18px;position:sticky;top:0;height:100vh}.brand{font-size:22px;font-weight:900;line-height:1.25}.brand small{display:block;margin-top:8px;color:#9ca3af;font-size:13px;font-weight:400}.nav{margin-top:28px;display:grid;gap:6px}.nav button{border:0;background:transparent;color:#d1d5db;text-align:left;padding:12px 13px;border-radius:12px;cursor:pointer;font-size:14px}.nav button.active,.nav button:hover{background:#1f2937;color:#fff}.main{padding:30px;max-width:1280px}.top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:22px}.kicker{color:var(--primary);font-weight:800;font-size:13px;margin-bottom:6px}h1{margin:0;font-size:32px;letter-spacing:-.5px}h2{margin:0 0 14px;font-size:20px}.sub{color:var(--muted);font-size:14px;margin-top:8px;line-height:1.6}.section{display:none}.section.active{display:block}.grid{display:grid;gap:16px}.cols4{grid-template-columns:repeat(4,minmax(0,1fr))}.cols2{grid-template-columns:repeat(2,minmax(0,1fr))}.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px;box-shadow:0 10px 24px rgba(15,23,42,.04)}.metric .label{color:var(--muted);font-size:13px;margin-bottom:8px}.metric .value{font-size:24px;font-weight:900;word-break:break-word}.btn{border:0;background:var(--primary);color:#fff;padding:11px 15px;border-radius:12px;font-weight:800;cursor:pointer}.btn.gray{background:#374151}.btn:disabled{opacity:.55;cursor:not-allowed}.progress{height:10px;background:#e5e7eb;border-radius:999px;overflow:hidden}.bar{height:100%;background:var(--primary);width:0}.badge{display:inline-block;padding:5px 9px;border-radius:999px;font-size:12px;font-weight:800;background:#eef2ff;color:#3730a3}.badge.Done,.badge.Accepted{background:#dcfce7;color:#166534}.badge.Open,.badge.Draft{background:#dbeafe;color:#1d4ed8}.badge.Review,.badge.InProgress{background:#fef9c3;color:#854d0e}.list-item{border-bottom:1px solid var(--line);padding:12px 0}.list-item:last-child{border-bottom:0}.list-title{font-weight:900}.form{display:grid;gap:12px}.row{display:grid;grid-template-columns:130px 1fr;gap:12px;align-items:center}label{font-weight:800;font-size:13px}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:11px;font:inherit;background:#fff}textarea{min-height:92px;resize:vertical}table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}th,td{padding:12px;border-bottom:1px solid var(--line);font-size:13px;text-align:left;vertical-align:top}th{background:#f9fafb;font-weight:900;white-space:nowrap}.empty{padding:18px;border:1px dashed var(--line);border-radius:var(--radius);background:#fff;color:var(--muted)}.toast{position:fixed;right:22px;top:22px;background:#111827;color:#fff;padding:13px 16px;border-radius:14px;opacity:0;transform:translateY(-8px);transition:.2s;z-index:99}.toast.show{opacity:1;transform:translateY(0)}
    @media(max-width:900px){.layout{display:block}.side{position:static;height:auto}.main{padding:20px}.cols4,.cols2{grid-template-columns:1fr}.top{display:block}.row{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div id="toast" class="toast"></div>
  <div class="layout">
    <aside class="side">
      <div class="brand">AI Native Lab<small>공유용 CRUD v1</small></div>
      <div class="nav">
        <button class="active" data-sec="dashboard">대시보드</button>
        <button data-sec="roadmap">로드맵</button>
        <button data-sec="decision">의사결정</button>
        <button data-sec="opinion">의견</button>
        <button data-sec="framework">프레임워크</button>
      </div>
    </aside>
    <main class="main">
      <div class="top">
        <div>
          <div class="kicker">AI Native Enterprise Framework</div>
          <h1 id="pageTitle">대시보드</h1>
          <div class="sub" id="subtitle">데이터를 불러오는 중입니다.</div>
        </div>
        <button class="btn gray" onclick="loadData()">새로고침</button>
      </div>
      <section id="dashboard" class="section active"></section>
      <section id="roadmap" class="section"></section>
      <section id="decision" class="section"></section>
      <section id="opinion" class="section"></section>
      <section id="framework" class="section"></section>
    </main>
  </div>
<script>
let DATA={};let IS_SAVING=false;
document.querySelectorAll('.nav button').forEach(btn=>{btn.onclick=()=>{document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));btn.classList.add('active');document.getElementById(btn.dataset.sec).classList.add('active');document.getElementById('pageTitle').textContent=btn.textContent;};});
function loadData(){if(!API_URL||API_URL.includes('PASTE_')){showToast('config.js에 API_URL을 입력하세요.');return;}jsonp(API_URL+'?action=getBoardData').then(data=>{DATA=data||{};render();}).catch(err=>showToast('불러오기 오류: '+err.message));}
function jsonp(url){return new Promise((resolve,reject)=>{const cb='cb_'+Date.now()+'_'+Math.random().toString(36).slice(2);window[cb]=data=>{resolve(data);delete window[cb];script.remove();};const script=document.createElement('script');script.src=url+(url.includes('?')?'&':'?')+'callback='+cb;script.onerror=()=>{delete window[cb];script.remove();reject(new Error('JSONP 요청 실패'));};document.body.appendChild(script);});}
function render(){const p=DATA.project||{};document.getElementById('subtitle').textContent=`${p['Project Name']||'-'} · ${p['Status']||'-'} · v${p['Version']||'-'} · ${p['Last Updated']||''}`;renderDashboard();renderRoadmap();renderDecision();renderOpinion();renderFramework();}
function renderDashboard(){const p=DATA.project||{};const roadmap=DATA.roadmap||[];const decisions=DATA.decisions||[];const opinions=DATA.opinions||[];const framework=DATA.framework||[];const progress=num(p['Progress']);const current=roadmap.find(r=>r.Status==='In Progress')||roadmap[0]||{};document.getElementById('dashboard').innerHTML=`<div class="card"><h2>현재 연구 상태</h2><div class="grid cols4">${metric('현재 연구',p['Project Name']||'-')}${metric('현재 단계',current.Phase||p['Current Phase']||'-')}${metric('진행률',progress+'%')}${metric('최근 업데이트',p['Last Updated']||'-')}</div><div style="margin-top:18px"><div class="sub">${esc(current.Description||'')}</div><div class="progress" style="margin-top:10px"><div class="bar" style="width:${num(current.Progress)||progress}%"></div></div></div></div><div class="grid cols4" style="margin-top:16px">${metric('로드맵',roadmap.length)}${metric('의사결정',decisions.length)}${metric('열린 의견',opinions.filter(x=>x.Status==='Open').length)}${metric('프레임워크',framework.length)}</div><div class="grid cols2" style="margin-top:16px"><div class="card"><h2>최근 의사결정</h2>${list(decisions.slice(0,5),'Title','Decision')}</div><div class="card"><h2>최근 의견</h2>${list(opinions.slice(0,5),'Topic','Opinion')}</div></div>`;}
function renderRoadmap(){document.getElementById('roadmap').innerHTML=`<div class="card"><h2>로드맵 수정</h2><div class="form">${row('No','<input id="rd-no" placeholder="예: 1">')}${row('상태','<select id="rd-status"><option>Draft</option><option>In Progress</option><option>Review</option><option>Done</option></select>')}${row('진행률','<input id="rd-progress" type="number" min="0" max="100">')}${row('담당자',memberSelect('rd-owner'))}${row('메모','<textarea id="rd-note"></textarea>')}<button class="btn" onclick="submitRoadmap(this)">수정</button></div></div><div style="height:16px"></div>${table(DATA.roadmap,['No','Phase','Description','Status','Progress','Owner','Note'])}`;}
function renderDecision(){document.getElementById('decision').innerHTML=`<div class="card"><h2>의사결정 추가</h2><div class="form">${row('작성자',memberSelect('dec-author'))}${row('제목','<input id="dec-title">')}${row('결정','<textarea id="dec-decision"></textarea>')}${row('이유','<textarea id="dec-reason"></textarea>')}${row('상태','<select id="dec-status"><option>Draft</option><option>Review</option><option>Accepted</option><option>Deprecated</option></select>')}<button class="btn" onclick="submitDecision(this)">저장</button></div></div><div style="height:16px"></div>${table(DATA.decisions,['ID','Date','Author','Title','Decision','Reason','Status'])}`;}
function renderOpinion(){document.getElementById('opinion').innerHTML=`<div class="card"><h2>의견 추가</h2><div class="form">${row('작성자',memberSelect('op-author'))}${row('주제','<input id="op-topic">')}${row('의견','<textarea id="op-opinion"></textarea>')}${row('상태','<select id="op-status"><option>Open</option><option>Review</option><option>Accepted</option><option>Closed</option></select>')}<button class="btn" onclick="submitOpinion(this)">저장</button></div></div><div style="height:16px"></div>${table(DATA.opinions,['ID','Date','Author','Topic','Opinion','Status'])}`;}
function renderFramework(){document.getElementById('framework').innerHTML=`<div class="card"><h2>프레임워크 후보 추가</h2><div class="form">${row('분류','<input id="fw-category">')}${row('제목','<input id="fw-title">')}${row('내용','<textarea id="fw-content"></textarea>')}${row('상태','<select id="fw-status"><option>Draft</option><option>Review</option><option>Accepted</option><option>Deprecated</option></select>')}<button class="btn" onclick="submitFramework(this)">저장</button></div></div><div style="height:16px"></div>${table(DATA.framework,['ID','Category','Title','Content','Status','Version'])}`;}
function submitDecision(btn){post(btn,'decision',{author:val('dec-author'),title:val('dec-title'),decision:val('dec-decision'),reason:val('dec-reason'),status:val('dec-status')});}
function submitOpinion(btn){post(btn,'opinion',{author:val('op-author'),topic:val('op-topic'),opinion:val('op-opinion'),status:val('op-status')});}
function submitFramework(btn){post(btn,'framework',{category:val('fw-category'),title:val('fw-title'),content:val('fw-content'),status:val('fw-status')});}
function submitRoadmap(btn){post(btn,'roadmap',{no:val('rd-no'),status:val('rd-status'),progress:val('rd-progress'),owner:val('rd-owner'),note:val('rd-note')});}
function post(btn,type,data){if(!lock(btn))return;fetch(API_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({type,data})}).then(()=>{showToast('저장 요청 완료. 잠시 후 새로고침합니다.');setTimeout(()=>{unlock(btn);loadData();},1200);}).catch(err=>{showToast('저장 오류: '+err.message);unlock(btn);});}
function metric(label,value){return `<div class="card metric"><div class="label">${esc(label)}</div><div class="value">${esc(value)}</div></div>`}function row(label,input){return `<div class="row"><label>${esc(label)}</label>${input}</div>`}function memberSelect(id){return `<select id="${id}">${(DATA.members||['etc']).map(m=>`<option>${esc(m)}</option>`).join('')}</select>`}function list(rows,t,b){if(!rows||!rows.length)return '<div class="empty">등록된 항목이 없습니다.</div>';return rows.map(r=>`<div class="list-item"><div class="list-title">${esc(r[t])}</div><div class="sub">${esc(r[b])}</div></div>`).join('')}function table(rows,headers){if(!rows||!rows.length)return '<div class="empty">등록된 항목이 없습니다.</div>';return `<table><thead><tr>${headers.map(h=>`<th>${esc(h)}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${headers.map(h=>cell(h,r[h])).join('')}</tr>`).join('')}</tbody></table>`}function cell(k,v){if(k==='Status')return `<td><span class="badge ${cls(v)}">${esc(v)}</span></td>`;if(k==='Progress'){const n=num(v);return `<td>${n}%<div class="progress"><div class="bar" style="width:${n}%"></div></div></td>`}return `<td>${esc(v)}</td>`}function val(id){const el=document.getElementById(id);return el?el.value:''}function num(v){return parseFloat(String(v||'0').replace('%',''))||0}function esc(v){return String(v||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}function cls(v){return String(v||'').replace(/[^a-zA-Z0-9_-]/g,'')}function lock(btn){if(IS_SAVING)return false;IS_SAVING=true;btn.disabled=true;btn.dataset.txt=btn.textContent;btn.textContent='저장중...';return true}function unlock(btn){IS_SAVING=false;if(btn){btn.disabled=false;btn.textContent=btn.dataset.txt||'저장'}}function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
loadData();
</script>
</body>
</html>
